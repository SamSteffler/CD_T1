<style>

        margin: 0;
        padding: 0;
        box-sizing: border-box
    }

        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;

    }

    }

    }

    }

    }

    .bit-row input:focus {

    }

    .controls-section {

    .enc-tabs {

    }

    .prop-val.mid {

</style>

<div class="container">
    <h1>Visualizador de Codificações de Linha</h1>
    <div class="input-section">
        <div class="bit-row">
            <span>Entrada:</span>
            <input type="text" id="bitSequence" placeholder="Ex: 10011010">
        </div>
    </div>
    <div class="controls-section">
        <h2 class="sr-only">Esquemas de codificação disponíveis</h2>
        <div class="enc-tabs" id="tabs"></div>
    </div>
    <div class="content-section">
        <div id="canvases"></div>
    </div>
</div>

<script>
    // listagem das propriedades e metodos de desenho para cada esquema
    const SCHEMES = [
        {
            id: 'nrzl', name: 'NRZ-L',
            props: { sync: 'Ruim', dc: 'Sim', bw: '1 * taxa', erro: 'Não' },
            syncQ: 'bad', dcQ: 'bad', bwQ: 'good', erroQ: 'bad',
            draw(ctx, bits, W, H, bw, hi, lo, mid, tc) {
                ctx.beginPath();
                bits.forEach((b, i) => {
                    const x = i * bw; const y = b ? hi : lo;
                    if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
                    ctx.lineTo(x + bw, y);
                });
                ctx.stroke();
            }
        },
        {
            id: 'nrzi', name: 'NRZ-I',
            props: { sync: 'Parcial', dc: 'Sim', bw: '1 * taxa', erro: 'Não' },
            syncQ: 'mid', dcQ: 'bad', bwQ: 'good', erroQ: 'bad',
            draw(ctx, bits, W, H, bw, hi, lo, mid, tc) {
                let cur = lo;
                ctx.beginPath();
                bits.forEach((b, i) => {
                    const x = i * bw;
                    if (b === 1) { cur = cur === lo ? hi : lo; }
                    if (i === 0) ctx.moveTo(x, cur); else ctx.lineTo(x, cur);
                    ctx.lineTo(x + bw, cur);
                });
                ctx.stroke();
            }
        },
        {
            id: 'man', name: 'Manchester',
            props: { sync: 'Excelente', dc: 'Não', bw: '2 * taxa', erro: 'Não' },
            syncQ: 'good', dcQ: 'good', bwQ: 'bad', erroQ: 'bad',
            draw(ctx, bits, W, H, bw, hi, lo, mid, tc) {
                ctx.beginPath();
                bits.forEach((b, i) => {
                    const x = i * bw; const xm = x + bw / 2;
                    if (b === 1) {
                        if (i === 0) ctx.moveTo(x, lo); else ctx.lineTo(x, lo);
                        ctx.lineTo(xm, lo); ctx.lineTo(xm, hi); ctx.lineTo(x + bw, hi);
                    } else {
                        if (i === 0) ctx.moveTo(x, hi); else ctx.lineTo(x, hi);
                        ctx.lineTo(xm, hi); ctx.lineTo(xm, lo); ctx.lineTo(x + bw, lo);
                    }
                });
                ctx.stroke();
            }
        },
        {
            id: 'dman', name: 'Man. diferencial',
            props: { sync: 'Excelente', dc: 'Não', bw: '2 * taxa', erro: 'Não' },
            syncQ: 'good', dcQ: 'good', bwQ: 'bad', erroQ: 'bad',
            draw(ctx, bits, W, H, bw, hi, lo, mid, tc) {
                let cur = hi;
                ctx.beginPath();
                bits.forEach((b, i) => {
                    const x = i * bw; const xm = x + bw / 2;
                    if (b === 0) { cur = cur === hi ? lo : hi; }
                    const nxt = cur === hi ? lo : hi;
                    if (i === 0) ctx.moveTo(x, cur); else ctx.lineTo(x, cur);
                    ctx.lineTo(xm, cur); ctx.lineTo(xm, nxt); ctx.lineTo(x + bw, nxt);
                    cur = nxt;
                });
                ctx.stroke();
            }
        },
        {
            id: 'ami', name: 'AMI',
            props: { sync: 'Parcial', dc: 'Não', bw: '1 * taxa', erro: 'Sim (bipolar)' },
            syncQ: 'mid', dcQ: 'good', bwQ: 'good', erroQ: 'good',
            draw(ctx, bits, W, H, bw, hi, lo, mid, tc) {
                let pol = 1;
                ctx.beginPath();
                bits.forEach((b, i) => {
                    const x = i * bw;
                    let y;
                    if (b === 0) { y = mid; }
                    else { y = pol === 1 ? hi : lo; pol *= -1; }
                    if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
                    ctx.lineTo(x + bw, y);
                });
                ctx.stroke();
                ctx.setLineDash([3, 3]);
                ctx.strokeStyle = tc;
                ctx.lineWidth = 0.5;
                ctx.beginPath(); ctx.moveTo(0, mid); ctx.lineTo(W, mid); ctx.stroke();
                ctx.setLineDash([]);
            }
        },
        {
            id: 'psternary', name: 'Pseudoternário',
            props: { sync: 'Parcial', dc: 'Não', bw: '1 * taxa', erro: 'Sim (inversão)' },
            syncQ: 'mid', dcQ: 'good', bwQ: 'good', erroQ: 'good',
            draw(ctx, bits, W, H, bw, hi, lo, mid, tc) {
                let pol = 1;
                ctx.beginPath();
                bits.forEach((b, i) => {
                    const x = i * bw;
                    let y;
                    if (b === 0) { y = pol === 1 ? hi : lo; pol *= -1; }
                    else { y = mid; }
                    if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
                    ctx.lineTo(x + bw, y);
                });
                ctx.stroke();
                ctx.setLineDash([3, 3]);
                ctx.strokeStyle = tc;
                ctx.lineWidth = 0.5;
                ctx.beginPath(); ctx.moveTo(0, mid); ctx.lineTo(W, mid); ctx.stroke();
                ctx.setLineDash([]);
            }
        },
        {
            id: 'mlt3', name: 'MLT-3',
            props: { sync: 'Excelente', dc: 'Não', bw: '1 * taxa', erro: 'Não' },
            syncQ: 'good', dcQ: 'good', bwQ: 'good', erroQ: 'bad',
            draw(ctx, bits, W, H, bw, hi, lo, mid, tc) {
                const levels = [hi, mid, lo, mid];
                let levelIdx = 0;
                ctx.beginPath();
                bits.forEach((b, i) => {
                    const x = i * bw;
                    if (b === 1) { levelIdx = (levelIdx + 1) % 4; }
                    const y = levels[levelIdx];
                    if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
                    ctx.lineTo(x + bw, y);
                });
                ctx.stroke();
                ctx.setLineDash([3, 3]);
                ctx.strokeStyle = tc;
                ctx.lineWidth = 0.5;
                ctx.beginPath(); ctx.moveTo(0, mid); ctx.lineTo(W, mid); ctx.stroke();
                ctx.setLineDash([]);
            }
        },
        {
            id: '2b1q', name: '2B1Q',
            props: { sync: 'Parcial', dc: 'Não', bw: '0,5 * taxa', erro: 'Não' },
            syncQ: 'mid', dcQ: 'good', bwQ: 'good', erroQ: 'bad',
            draw(ctx, bits, W, H, bw, hi, lo, mid, tc) {
                const map = { '00': lo, '01': lo + (hi - lo) / 3, '10': hi, '11': lo + (hi - lo) / 3 * 2 };
                ctx.beginPath();
                for (let i = 0; i < bits.length; i += 2) {
                    const pair = bits.slice(i, i + 2).join('').padEnd(2, '0');
                    const y = map[pair] || lo;
                    const x = (i / 2) * bw;
                    if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
                    ctx.lineTo(x + bw, y);
                }
                ctx.stroke();
                ctx.setLineDash([3, 3]);
                ctx.strokeStyle = tc;
                ctx.lineWidth = 0.5;
                ctx.beginPath(); ctx.moveTo(0, mid); ctx.lineTo(W, mid); ctx.stroke();
                ctx.setLineDash([]);
            }
        },
        {
            id: 'cmi', name: 'CMI',
            props: { sync: 'Parcial', dc: 'Não', bw: '2 * taxa', erro: 'Sim (inversão)' },
            syncQ: 'mid', dcQ: 'good', bwQ: 'good', erroQ: 'good',
            draw(ctx, bits, W, H, bw, hi, lo, mid, tc) {
                let lastLevel = null;
                let lastOneLevel = null;
                ctx.beginPath();
                bits.forEach((b, i) => {
                    const x = i * bw;
                    const mid_x = x + bw / 2;

                    if (b === 1) {
                        // bit um: oposto ao ultimo bit 1
                        const nextLevel = lastOneLevel === hi ? lo : hi;
                        if (lastOneLevel === null) ctx.moveTo(x, lastLevel === null ? hi : lastLevel); else ctx.lineTo(x, lastLevel);
                        ctx.lineTo(x, nextLevel);
                        ctx.lineTo(x + bw, nextLevel);
                        lastOneLevel = nextLevel;
                        lastLevel = nextLevel;
                    } else {
                        // bit zero: transicao obrigatoria lo -> hi
                        if (lastLevel === null) { ctx.moveTo(x, lo); }
                        else if (lastLevel === hi) { ctx.lineTo(x, lo); }
                        if (lastOneLevel === null) ctx.moveTo(x, lo);
                        ctx.lineTo(mid_x, lo);
                        ctx.lineTo(mid_x, hi);
                        ctx.lineTo(x + bw, hi);
                        lastLevel = hi;
                    }
                });
                ctx.stroke();
                ctx.setLineDash([3, 3]);
                ctx.strokeStyle = tc;
                ctx.lineWidth = 0.5;
                ctx.beginPath(); ctx.moveTo(0, mid); ctx.lineTo(W, mid); ctx.stroke();
                ctx.setLineDash([]);
            }
        }
    ];
    
    // valores e esquema de entrada para representacao
    let bits = [1, 0, 0, 1, 1, 0, 1, 0];
    let activeSchemes = new Set(['nrzl']);
    
    //atualiza em tempo real os sinais
    function updateBitsFromSequence() {
        const seq = document.getElementById('bitSequence').value.trim();
        if (!seq) { bits = []; draw(); return; }
        const validBits = seq.match(/[01]/g);
        if (!validBits) { bits = []; draw(); return; }
        bits = validBits.map(Number);
        draw();
    }
    // monta a lista de esquemas disponiveis
    function buildTabs() {
        const tabs = document.getElementById('tabs');
        tabs.innerHTML = '';
        SCHEMES.forEach(s => {
            const t = document.createElement('button');
            t.className = 'enc-tab' + (activeSchemes.has(s.id) ? ' on' : '');
            t.textContent = s.name;
            t.onclick = () => {
                if (activeSchemes.has(s.id)) {
                    activeSchemes.delete(s.id);
                } else {
                    activeSchemes.add(s.id);
                }
                buildTabs(); draw();
            };
            tabs.appendChild(t);
        });
    }
    
    // conta a quantidade de nmundasncas de nivel para cada esquema
    function contaTransicoes(schemeId, bits) {
        if (bits.length === 0) return 0;
        const hi = 38; const lo = 138; const mid = (hi + lo) / 2;
        const s = SCHEMES.find(x => x.id === schemeId);
        let levels = [];
        let transicoes = 0;

        if (schemeId === 'nrzl') {
            // conta quando bit muda de estado de 1 -> 0 ou 0 -> 1
            let lastLevel = null;
            bits.forEach(b => {
                const level = b ? hi : lo;
                if (lastLevel !== null && lastLevel !== level) transicoes++;
                lastLevel = level;
            });
        } else if (schemeId === 'nrzi') {
            // conta quando bit 1 aparece e se tem valor diferente do ultimo
            let cur = lo;
            let lastLevel = null;
            bits.forEach(b => {
                if (b === 1) cur = cur === hi ? lo : hi;
                if (lastLevel !== null && lastLevel !== cur) transicoes++;
                lastLevel = cur;
            });
        } else if (schemeId === 'man') {
            // contar transicoes duplas se o bit anterior for igual ao atual (1 -> 1 ou 0 -> 0)
            let lastLevel = null;
            bits.forEach(b => {
                const level = b ? hi : lo;
                if (lastLevel !== null) {
                    if (lastLevel === level) transicoes += 2; // transicao dupla
                    else transicoes++; // transicao simples
                } else transicoes++;
                lastLevel = level;
            });
        } else if (schemeId === 'dman') {
            // conta quantidade de trasicoes = numero de bits + numero de bits zero (transicao obrigatoria no inicio do bit)
            let lastLevel = null;
            bits.forEach(b => {
                const level = b ? hi : lo;
                if (level === lo) {
                    if (lastLevel !== null) transicoes++; // muda para estado alto
                    transicoes++; // transicao obrigatoria  
                } else transicoes++;
                lastLevel = level;
            });
        } else if (schemeId === 'ami') {
            // conta uma transicao toda vez que nivel (tanto 1 ou -1 -> 0 ou 0 -> 1 ou -1) muda
            let pol = 1;
            let lastLevel = null;
            bits.forEach(b => {
                let y;
                if (b === 0) { y = mid; }
                else { y = pol === 1 ? hi : lo; pol *= -1; }
                if (lastLevel !== null && lastLevel !== y) transicoes++;
                lastLevel = y;
            });
        } else if (schemeId === 'mlt3') {
            // compara mudanca de nivel logico (que so acontece quando b == 1)
            const levels = [hi, mid, lo, mid];
            let levelIdx = 0;
            let lastLevel = null;
            bits.forEach(b => {
                if (b === 1) levelIdx = (levelIdx + 1) % 4;
                const level = levels[levelIdx];
                if (lastLevel !== null && lastLevel !== level) transicoes++;
                lastLevel = level;
            });
        } else if (schemeId === '2b1q') {
            // compara niveis par a par usando os niveis reais da codificacao 2B1Q
            const tensoes = { '00': -3, '01': -1, '10': 3, '11': 1 };
            const voltageToY = v => mid - (v / 3) * (lo - mid);
            let lastLevel = null;
            for (let i = 0; i < bits.length; i += 2) {
                const pair = bits.slice(i, i + 2).join('').padEnd(2, '0');
                const level = voltageToY(tensoes[pair] ?? -3);
                if (lastLevel !== null && lastLevel !== level) transicoes++;
                lastLevel = level;
            }
        } else if (schemeId === 'cmi') {
            // zero transicao: bit 1 alto depois de um bit zero (ultimo bit 1 = low)
            // uma transicao: bit 1 depois de outro bit 1 ou bit zero depois de bit 1 low
            // duas transicoes: bit zero depois de bit zero ou bit zero depois de bit 1 high
            let lastLevel = lo;
            let lastOneLevel = null;
            const samples = [];
            for (let i = 0; i < bits.length; i++) {
                const b = bits[i];
                if (b === 1) {
                    const nextLevel = lastOneLevel === hi ? lo : hi;
                    if (lastOneLevel === null) {
                        samples.push(nextLevel);
                        samples.push(nextLevel);
                        samples.push(nextLevel);
                    } else {
                        samples.push(lastLevel);
                        samples.push(nextLevel);
                        samples.push(nextLevel);
                    }
                    lastOneLevel = nextLevel;
                    lastLevel = nextLevel;
                } else {
                    samples.push(lastLevel);
                    samples.push(lo);
                    samples.push(hi);
                    lastLevel = hi;
                }
            }
            let last = null;
            // conta string formada pelas transicoes
            samples.forEach(s => { if (last !== null && last !== s) transicoes++; last = s; });
        } else if (schemeId === 'psternary') {
            // mesma logica de ami com bit de transicao invertido
            let pol = 1;
            let lastLevel = null;
            bits.forEach(b => {
                let y;
                if (b === 0) { y = pol === 1 ? hi : lo; pol *= -1; }
                else { y = mid; }
                if (lastLevel !== null && lastLevel !== y) transicoes++;
                lastLevel = y;
            });
        }
        return transicoes;
    }

    // regras de cada protocolo para calcular a tensao dc media
    function calculaDCmedio(schemeId, bits) {
        if (bits.length === 0) return 0;
        const hi = 38; const lo = 138; const mid = (hi + lo) / 2;
        let sum = 0;
        let count = 0;

        if (schemeId === 'nrzl') {
            // soma altura dos pixels da cada sinal apenas
            bits.forEach(b => { sum += b ? hi : lo; count++; });
        } else if (schemeId === 'nrzi') {
            let cur = lo;
            // inverte cur se necessario e soma a altura do pixel de cur
            bits.forEach(b => {
                if (b === 1) cur = cur === hi ? lo : hi;
                sum += cur; count++;
            });
        } else if (schemeId === 'man') {
            // sempre sera igual a media entre hi e lo pois meio ciclo eh hi e meio ciclo eh lo
            // poderia ser mudado para mid
            bits.forEach(() => { sum += (hi + lo) / 2; count++; });
        } else if (schemeId === 'dman') {
            let cur = hi;
            // mesma ideia de manchester normal
            bits.forEach(() => { sum += (hi + lo) / 2; count++; });
        } else if (schemeId === 'ami') {
            let pol = 1;
            // soma mid se for zero e hi/lo a depender da ordem do bit 1
            bits.forEach(b => {
                if (b === 0) sum += mid;
                else {
                    sum += pol === 1 ? hi : lo;
                    pol *= -1;
                }
                count++;
            });
        } else if (schemeId === 'mlt3') {
            // cicla pelos niveies em levels[] a cada bit 1 lido, 0 mantem o nivel anterior
            const levels = [hi, mid, lo, mid];
            let levelIdx = 0;
            bits.forEach(b => { if (b === 1) levelIdx = (levelIdx + 1) % 4; sum += levels[levelIdx]; count++; });
        } else if (schemeId === '2b1q') {
            // diferente pois trabalha com niveis definidos (resposta retornada diferente do resto)
            const tensoes = { '00': -3, '01': -1, '10': 3, '11': 1 };
            for (let i = 0; i < bits.length; i += 2) {
                const pair = bits.slice(i, i + 2).join('').padEnd(2, '0');
                sum += tensoes[pair] ?? -3;
                count++;
            }
        } else if (schemeId === 'cmi') {
            let currentLevel = lo;
            bits.forEach(b => {
                if (b === 1) {
                    currentLevel = currentLevel === hi ? lo : hi;
                    sum += currentLevel;
                } else {
                    sum += (hi + lo) / 2;
                }
                count++;
            });
        } else if (schemeId === 'psternary') {
            let pol = 1;
            // logica inversa da ami
            bits.forEach(b => {
                let y;
                if (b === 0) { y = pol === 1 ? hi : lo; pol *= -1; }
                else { y = mid; }
                sum += y; count++;
            });
        }
        if (schemeId === '2b1q') {
            // media simples sem mapeamento entre -1 e 1
            return count > 0 ? (sum / count).toFixed(2) : 0;
        }
        // media de tensao fica normalizada entre -V e +V com excecao do 2B1Q
        // valores da soma ficarao entre 38 (+v) e -138 (-V)
        return count > 0 ? ((sum / count - lo) / (hi - lo) * 2 - 1).toFixed(2) : 0;
    }

    // funcao para desenho de cada formato de onda
    function draw() {
        const container = document.getElementById('canvases');
        container.innerHTML = '';
        if (bits.length === 0 || activeSchemes.size === 0) return;
        const tc = getComputedStyle(document.documentElement).getPropertyValue('--color-text-tertiary').trim();
        const bc = getComputedStyle(document.documentElement).getPropertyValue('--color-border-tertiary').trim();
        const labels = { sync: 'Sincronização', dc: 'Componente DC', bw: 'Banda consumida', erro: 'Detecção de erro', transitions: 'Transições', avgLevel: 'Nível Médio' };
        const qmapKey = { sync: 'syncQ', dc: 'dcQ', bw: 'bwQ', erro: 'erroQ' };

        // cria cards para cada esquema marcado como ativo na lista de ativos
        activeSchemes.forEach(schemeId => {
            const s = SCHEMES.find(x => x.id === schemeId);
            const item = document.createElement('div');
            item.className = 'canvas-item';
            const wrapper = document.createElement('div');
            wrapper.className = 'canvas-wrapper';
            // grafico de sinal
            const label = document.createElement('div');
            label.className = 'canvas-label';
            label.textContent = s.name;
            wrapper.appendChild(label);
            const canvas = document.createElement('canvas');
            canvas.height = 190;
            wrapper.appendChild(canvas);
            item.appendChild(wrapper);
            // painel de propriedades
            const propsPanel = document.createElement('div');
            propsPanel.className = 'canvas-properties';
            // informacoes de cada propriedade do esquema
            const propsArray = ['sync', 'dc', 'bw', 'erro', 'transitions', 'avgLevel'];
            propsArray.forEach(k => {
                const d = document.createElement('div');
                d.className = 'prop';
                const lbl = document.createElement('div');
                lbl.className = 'prop-label';
                lbl.textContent = labels[k];
                const val = document.createElement('div');

                let value = '';
                if (k === 'transitions') {
                    value = contaTransicoes(schemeId, bits).toString();
                } else if (k === 'avgLevel') {
                    value = calculaDCmedio(schemeId, bits).toString();
                    if (schemeId === '2b1q') value += ' V';
                } else {
                    val.className = 'prop-val' + (qmapKey[k] ? ' ' + s[qmapKey[k]] : '');
                    value = s.props[k];
                }
                val.textContent = value;
                d.appendChild(lbl);
                d.appendChild(val);
                propsPanel.appendChild(d);
            });
            item.appendChild(propsPanel);
            container.appendChild(item);
            // configuracao do canvas
            const dpr = window.devicePixelRatio || 1;
            const W = canvas.offsetWidth;
            const H = Math.max(190, propsPanel.offsetHeight);
            canvas.width = W * dpr; canvas.height = H * dpr;
            const ctx = canvas.getContext('2d');
            ctx.scale(dpr, dpr);
            ctx.clearRect(0, 0, W, H);
            const hi = Math.max(30, H * 0.2);
            const lo = Math.min(H - 30, H * 0.75);
            const mid = (hi + lo) / 2;

            let bw = W / bits.length;
            let gridBits = bits;

            if (s.id === '2b1q') {
                //agrupar em pares
                let symbols = [];
                for (let i = 0; i < bits.length; i += 2) {
                    const pair = bits.slice(i, i + 2).join('').padEnd(2, '0');
                    symbols.push(pair);
                }
                gridBits = symbols;
                bw = W / symbols.length;
            }

            const gridBw = W / gridBits.length;
            ctx.strokeStyle = bc; ctx.lineWidth = 0.5;
            gridBits.forEach((_, i) => {
                const x = i * gridBw;
                ctx.beginPath(); ctx.moveTo(x, 24); ctx.lineTo(x, H - 18); ctx.stroke();
            });
            ctx.fillStyle = tc; ctx.font = '12px sans-serif';
            gridBits.forEach((b, i) => ctx.fillText(b, i * gridBw + gridBw / 2 - 4, 18));
            ctx.strokeStyle = bc; ctx.lineWidth = 0.3; ctx.setLineDash([2, 3]);
            if (s.id === '2b1q') {
                const voltageToY = v => mid - (v / 3) * (lo - mid);
                [
                    { text: '+3V', y: voltageToY(3) },
                    { text: '+1V', y: voltageToY(1) },
                    { text: '-1V', y: voltageToY(-1) },
                    { text: '-3V', y: voltageToY(-3) },
                ].forEach(({ text, y }) => {
                    ctx.beginPath(); ctx.moveTo(28, y); ctx.lineTo(W, y); ctx.stroke();
                    ctx.fillText(text, 4, y + 4);
                });
            } else {
                ctx.fillText('+V', 4, hi + 4); ctx.fillText('0', 4, mid + 4); ctx.fillText('-V', 4, lo + 4);
                [hi, lo].forEach(y => { ctx.beginPath(); ctx.moveTo(28, y); ctx.lineTo(W, y); ctx.stroke(); });
            }
            ctx.setLineDash([]);

            ctx.strokeStyle = '#1D9E75'; ctx.lineWidth = 2.5; ctx.lineJoin = 'round'; ctx.lineCap = 'round';
            // chama metodo de desenho para cada esquema 
            s.draw(ctx, bits, W, H, bw, hi, lo, mid, tc);
        });
    }

    buildTabs();
    document.getElementById('bitSequence').addEventListener('input', updateBitsFromSequence);
    bits = [1, 0, 0, 1, 1, 0, 1, 0]; document.getElementById('bitSequence').value = '10011010'; draw();
    window.addEventListener('resize', draw);
</script>
</div>
